appId: com.nexusmind.app
productName: NexusMind

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - prisma-client/**/*
  - prisma/schema.prisma
  - prisma/migrations/**/*

# FFmpeg 8.1 bundled to enable the upstream ddagrab ACCESS_LOST recovery
# patch (feb 2024). ffmpeg-static 5.3.0 only ships 6.1.1, which is fatal to
# capture on any alt-tab / display mode transition.
extraResources:
  - from: resources/ffmpeg-bin/win-x64/ffmpeg.exe
    to: ffmpeg-bin/ffmpeg.exe

asarUnpack:
  - prisma-client/**/*
  - node_modules/@prisma/engines/**/*
  - node_modules/prisma/**/*
  - node_modules/ffmpeg-static/**/*

publish:
  provider: github
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  sign: false
  signingHashAlgorithms: []
  forceCodeSigning: false
  artifactName: NexusMind-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: NexusMind
